<div id="tutorial-screen" class="screen">
  <div style="max-width:500px; margin:auto; padding:40px 20px; text-align:center;">
    <div style="font-size:2.5rem; margin-bottom:10px;">📖</div>
    <h1 class="main-title" style="font-size:1.6rem; margin-bottom:8px;">チュートリアル</h1>
    <p style="color:#aaa; font-size:13px; margin-bottom:24px;">AIと対戦練習ができます。<br>チュートリアルデッキを選んで挑戦しよう！</p>
    <div style="background:var(--panel-bg); border:1px solid var(--border-col); border-radius:14px; padding:24px; margin-bottom:20px;">
      <p style="color:#fff; font-size:14px; margin-bottom:16px; font-weight:bold;">使用するデッキを選択</p>
      <div id="tutorial-deck-select-area"><p style="color:#555;">読み込み中...</p></div>
    </div>
    <button class="menu-btn" onclick="backToTop()">TOPへ戻る</button>
  </div>
</div>

<div id="tutorial-lobby-screen" class="screen">
  <div style="max-width:500px; margin:auto; padding:40px 20px; text-align:center;">
    <h2 style="color:var(--main-cyan); margin-bottom:20px; letter-spacing:3px;">DIGITAL GATE OPEN</h2>
    <div style="background:var(--panel-bg); border:1px solid var(--border-col); border-radius:14px; padding:20px; margin-bottom:30px;">
      <div style="display:flex; justify-content:space-around; align-items:center; margin-bottom:20px;">
        <div>
          <div style="font-size:12px; color:#aaa; margin-bottom:5px;" id="tl-you-label">YOU</div>
          <div id="tl-p-img" style="width:80px; height:110px; border:1px solid var(--main-cyan); border-radius:5px; background:#111; overflow:hidden;"></div>
        </div>
        <div style="font-size:24px; font-weight:bold; color:var(--border-col);">VS</div>
        <div>
          <div style="font-size:12px; color:#aaa; margin-bottom:5px;">🤖デジモンマスター</div>
          <div id="tl-ai-img" style="width:80px; height:110px; border:1px solid #ff00fb; border-radius:5px; background:#111; overflow:hidden;"></div>
        </div>
      </div>
      <div id="tutorial-status-msg" style="font-size:14px; color:var(--main-cyan); min-height:1.5em; margin-bottom:20px;">デッキを選択してください。</div>
      <div id="tutorial-action-area"></div>
    </div>
    <button class="menu-btn" onclick="showScreen('tutorial-screen')" style="border-color:#444; color:#888;">戻る</button>
  </div>
</div>

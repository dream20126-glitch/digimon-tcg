<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>演出タイプ プレビュー（18種）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh}
.header{padding:12px;text-align:center;border-bottom:1px solid #222}
.header h1{font-size:16px;color:#00fbff;letter-spacing:2px}
.header p{font-size:10px;color:#666;margin-top:2px}
.main{display:flex;flex-wrap:wrap;gap:10px;padding:12px}
.stage{flex:1;min-width:320px;min-height:420px;background:#050510;border:1px solid #222;border-radius:12px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.stage-label{position:absolute;top:6px;left:10px;font-size:9px;color:#333}
.panel{width:260px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:4px}
.panel::-webkit-scrollbar{width:4px}.panel::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.btn{background:#111;border:1px solid #282828;color:#bbb;padding:8px 10px;border-radius:6px;cursor:pointer;text-align:left;font-size:12px;transition:all 0.15s;line-height:1.3}
.btn:hover{border-color:#00fbff;color:#00fbff;background:#0a1520}
.btn:active{transform:scale(0.97)}
.btn-code{font-size:9px;color:#555;margin-top:1px}
.sample-card{width:100px;height:140px;border-radius:8px;border:2px solid #333;overflow:hidden;position:relative;background:#111;flex-shrink:0}
.sample-card img{width:100%;height:100%;object-fit:cover}
.sample-card-name{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:2px 4px;font-size:8px;text-align:center;color:#fff}
.card-slot{display:inline-block;text-align:center}
.card-slot-label{font-size:8px;color:#555;margin-top:3px}
.battle-area{display:flex;gap:16px;align-items:center}

/* ===== アニメーション ===== */
@keyframes popupFloat{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}40%{transform:translate(-50%,-50%) scale(1)}85%{opacity:1}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}
@keyframes appearFlash{0%{opacity:0;transform:scale(.3)}30%{opacity:1;transform:scale(1.1)}50%{transform:scale(1)}70%{box-shadow:0 0 40px #00fbff}100%{box-shadow:none}}
@keyframes evolveRotate{0%{transform:rotateY(0) scale(1)}40%{transform:rotateY(180deg) scale(.8)}60%{transform:rotateY(360deg) scale(1.1)}100%{transform:rotateY(360deg) scale(1)}}
@keyframes destroyShake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-5px)}20%,40%,60%,80%{transform:translateX(5px)}}
@keyframes destroyExplode{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2);filter:brightness(3)}100%{opacity:0;transform:scale(.1)}}
@keyframes moveCard{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(120px,-80px) scale(.4)}}
@keyframes vsSlam{0%{transform:translate(-50%,-50%) scale(0);opacity:0}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes selectPulse{0%,100%{box-shadow:0 0 8px var(--c)}50%{box-shadow:0 0 24px var(--c),0 0 48px color-mix(in srgb,var(--c),transparent 60%)}}
@keyframes buffApply{0%{opacity:0;transform:translateY(10px)}30%{opacity:1;transform:translateY(-5px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fullscreenText{0%{opacity:0;transform:translate(-50%,-50%) scale(.5);letter-spacing:16px}30%{opacity:1;transform:translate(-50%,-50%) scale(1.05);letter-spacing:5px}50%{transform:translate(-50%,-50%) scale(1)}85%{opacity:1}100%{opacity:0}}
@keyframes drawFly{0%{opacity:0;transform:translate(-60px,-90px) scale(.3) rotate(-20deg)}60%{opacity:1;transform:translate(0,0) scale(1.08) rotate(0)}100%{transform:translate(0,0) scale(1)}}
@keyframes confirmSlide{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes lineExpand{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
@keyframes flipCard{0%{transform:rotateY(180deg)}100%{transform:rotateY(0)}}
@keyframes linkInsert{0%{transform:rotate(0) translate(80px,0) scale(.8);opacity:0}40%{transform:rotate(-90deg) translate(40px,0) scale(.9);opacity:1}100%{transform:rotate(-90deg) translate(0,0) scale(1);opacity:1}}
@keyframes jogress1{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(60px,0) rotate(180deg)}100%{transform:translate(30px,-20px) rotate(360deg) scale(0);opacity:0}}
@keyframes jogress2{0%{transform:translate(0,0) rotate(0)}50%{transform:translate(-60px,0) rotate(-180deg)}100%{transform:translate(-30px,-20px) rotate(-360deg) scale(0);opacity:0}}
@keyframes jogressAppear{0%{opacity:0;transform:scale(0);filter:brightness(3)}40%{opacity:1;transform:scale(1.2);filter:brightness(2)}70%{transform:scale(1);filter:brightness(1.2)}100%{filter:brightness(1)}}
@keyframes sparkle{0%{opacity:0;transform:scale(0) rotate(0)}50%{opacity:1;transform:scale(1) rotate(180deg)}100%{opacity:0;transform:scale(0) rotate(360deg)}}
@keyframes sattackSlam{0%{transform:translate(-50%,-50%) scale(0) rotate(-10deg);opacity:0}40%{transform:translate(-50%,-50%) scale(1.2) rotate(2deg);opacity:1}60%{transform:translate(-50%,-50%) scale(.95) rotate(-1deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0)}}
</style>
</head>
<body>
<div class="header">
  <h1>🎬 演出タイプ プレビュー（18種）</h1>
  <p>ボタンを押すとステージで演出再生。演出内容の確認・フィードバック用</p>
</div>
<div class="main">
  <div class="stage" id="stage">
    <div class="stage-label">STAGE</div>
    <div id="sc" style="text-align:center;color:#333;font-size:13px;">← ボタンを押してください</div>
  </div>
  <div class="panel">
    <div style="font-size:11px;color:#00fbff;font-weight:bold;margin-bottom:2px">演出タイプ一覧</div>
    <button class="btn" onclick="d1()">1. 💚 数値ポップアップ+<div class="btn-code">popup_plus — DP+3000 等（緑）</div></button>
    <button class="btn" onclick="d2()">2. ❤ 数値ポップアップ-<div class="btn-code">popup_minus — DP-3000 等（赤）</div></button>
    <button class="btn" onclick="d3()">3. 💥 消滅演出<div class="btn-code">card_destroy — シェイク→パーティクル→DESTROYED</div></button>
    <button class="btn" onclick="d4()">4. ✨ カード登場<div class="btn-code">card_appear — DIGITAL APPEAR+フラッシュ</div></button>
    <button class="btn" onclick="d5()">5. 🔄 カード進化<div class="btn-code">card_evolve — DIGITAL EVOLUTION+回転</div></button>
    <button class="btn" onclick="d6()">6. 📤 カード移動<div class="btn-code">card_move — カードが移動先へ飛ぶ</div></button>
    <button class="btn" onclick="d7()">7. ⚔ VS画面<div class="btn-code">vs_battle — 2枚並べてVS+勝敗</div></button>
    <button class="btn" onclick="d8()">8. 🎯 対象選択UI<div class="btn-code">target_select — 枠ハイライト+確認</div></button>
    <button class="btn" onclick="d9()">9. ❓ 効果確認ダイアログ<div class="btn-code">confirm_dialog — 発動しますか？はい/いいえ</div></button>
    <button class="btn" onclick="d10()">10. 🚫 状態付与演出<div class="btn-code">buff_status — ⚔️✖️マーク等を持続表示</div></button>
    <button class="btn" onclick="d11()">11. 🃏 ドロー演出<div class="btn-code">draw_card — カードが手札へ+画像表示</div></button>
    <button class="btn" onclick="d12()">12. 📖 オープン演出<div class="btn-code">deck_open — N枚並べて→1枚ずつオープン</div></button>
    <button class="btn" onclick="d13()">13. 🔗 アプ合体<div class="btn-code">app_gattai — 2枚が回転して合体</div></button>
    <button class="btn" onclick="d14()">14. 🔌 リンク演出<div class="btn-code">link_effect — カードが横向きに刺さる</div></button>
    <button class="btn" onclick="d15()">15. 💬 文字ポップアップ<div class="btn-code">text_popup — カード名+付与効果名</div></button>
    <button class="btn" onclick="d16()">16. 🛡 ブロックダイアログ<div class="btn-code">block_dialog — ブロックしますか？</div></button>
    <button class="btn" onclick="d17()">17. ⚔ Sアタック+<div class="btn-code">sattack_plus — セキュリティアタック+N表示</div></button>
    <button class="btn" onclick="d18()">18. 🌟 ジョグレス進化<div class="btn-code">jogress_evolve — 2枚が光って合体→新カード</div></button>
  </div>
</div>
<script>
const S=document.getElementById('stage'),C=document.getElementById('sc');
const IMG='https://drive.google.com/thumbnail?id=1fVyZJvx4BnDZij_X22AljhAr3oUm8BcE&sz=w400';
function cl(){S.querySelectorAll('.fx').forEach(e=>e.remove());C.innerHTML=''}
function card(n,s){return`<div class="sample-card" style="${s||''}">${IMG?`<img src="${IMG}">`:''}` + `<div class="sample-card-name">${n}</div></div>`}
function ov(css,html,dur){const e=document.createElement('div');e.className='fx';e.style.cssText='position:absolute;'+css;if(html)e.innerHTML=html;S.appendChild(e);if(dur)setTimeout(()=>e.remove(),dur);return e}

// 1. 数値ポップアップ+
function d1(){cl();C.innerHTML=`<div class="card-slot">${card('ウォーグレイモン','border-color:#00ff88')}<div class="card-slot-label">対象</div></div>`;
ov('top:38%;left:50%;font-size:1.8rem;font-weight:bold;z-index:10;pointer-events:none;color:#00ff88;text-shadow:0 0 15px #00ff88;animation:popupFloat 3s ease forwards;text-align:center;white-space:nowrap',
'<div style="font-size:.9rem;color:#fff;margin-bottom:4px">ウォーグレイモン</div>DP+3000',3100)}

// 2. 数値ポップアップ-
function d2(){cl();C.innerHTML=`<div class="card-slot">${card('メタルガルルモン','border-color:#ff4444')}<div class="card-slot-label">対象</div></div>`;
ov('top:38%;left:50%;font-size:1.8rem;font-weight:bold;z-index:10;pointer-events:none;color:#ff4444;text-shadow:0 0 15px #ff4444;animation:popupFloat 3s ease forwards;text-align:center;white-space:nowrap',
'<div style="font-size:.9rem;color:#fff;margin-bottom:4px">メタルガルルモン</div>DP-3000',3100)}

// 3. 消滅演出
function d3(){cl();C.innerHTML=`<div id="dc">${card('グレイモン','border-color:#ff4444')}</div>`;
const dc=document.getElementById('dc');
// Win表示
ov('top:18%;left:50%;transform:translateX(-50%);font-size:1.6rem;font-weight:900;color:#00ff88;text-shadow:0 0 20px #00ff88;z-index:12;opacity:0;transition:opacity .3s','Win!!',3500).style.opacity='1';
setTimeout(()=>{dc.style.animation='destroyShake .5s ease'},800);
const fl=ov('inset:0;background:#ff0000;opacity:0;z-index:5;transition:opacity .2s','',2500);
setTimeout(()=>fl.style.opacity='.3',1300);setTimeout(()=>fl.style.opacity='0',1500);
ov('top:30%;left:50%;transform:translateX(-50%);font-size:1.4rem;font-weight:900;color:#ff4444;letter-spacing:4px;text-shadow:0 0 20px #ff4444;z-index:10;opacity:0;transition:opacity .3s','DESTROYED',3500).style.cssText+='transition-delay:.8s;opacity:1';
setTimeout(()=>{dc.style.animation='destroyExplode .8s ease forwards';
for(let i=0;i<12;i++){const p=ov(`left:${40+Math.random()*20}%;top:${35+Math.random()*30}%;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:#ff4444;border-radius:50%;box-shadow:0 0 8px #ff4444;z-index:8;transition:all .8s ease-out;opacity:1`,'',1000);
const a=Math.random()*360*Math.PI/180,dist=60+Math.random()*80;setTimeout(()=>{p.style.transform=`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`;p.style.opacity='0'},30)}},1600)}

// 4. カード登場
function d4(){cl();
ov('inset:0;background:#00fbff;opacity:0;z-index:5;transition:opacity .3s','',2500).style.cssText+='transition-delay:.05s;opacity:.25';
ov('top:12%;left:50%;transform:translateX(-50%);font-size:1.1rem;font-weight:900;color:#00fbff;letter-spacing:3px;text-shadow:0 0 20px #00fbff;z-index:6;opacity:0;transition:opacity .3s','DIGITAL APPEAR',2500).style.cssText+='transition-delay:.2s;opacity:1';
C.innerHTML=`<div style="animation:appearFlash 1.2s ease forwards;text-align:center">${card('ウォーグレイモン','border-color:#00fbff;box-shadow:0 0 30px #00fbff44')}<div style="margin-top:8px;font-size:11px;color:#00fbff">コスト12 登場！</div></div>`}

// 5. カード進化
function d5(){cl();
ov('top:10%;left:50%;transform:translateX(-50%);font-size:1rem;font-weight:900;color:#ffaa00;letter-spacing:3px;text-shadow:0 0 20px #ffaa00;z-index:6','DIGITAL EVOLUTION',2800);
ov('inset:0;background:#ffaa00;opacity:0;z-index:5;transition:opacity .2s','',2500).style.cssText+='transition-delay:.4s;opacity:.15';
C.innerHTML=`<div style="animation:evolveRotate 1.3s ease forwards;text-align:center">${card('メタルグレイモン','border-color:#ffaa00;box-shadow:0 0 30px #ffaa0044')}<div style="margin-top:8px;font-size:11px;color:#ffaa00">コスト3 進化！</div></div>`}

// 6. カード移動
function d6(){cl();C.innerHTML=`<div style="display:flex;align-items:center;gap:16px">
<div class="card-slot"><div id="mv" style="animation:moveCard 1.5s ease .5s forwards">${card('アグモン','border-color:#00fbff')}</div><div class="card-slot-label">バトルエリア</div></div>
<div style="font-size:18px;color:#00fbff">→</div>
<div class="card-slot"><div style="width:100px;height:140px;border:2px dashed #00fbff44;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#00fbff44">手札</div><div class="card-slot-label">移動先</div></div></div>`}

// 7. VS画面
function d7(){cl();C.innerHTML=`<div class="battle-area">
<div class="card-slot">${card('ウォーグレイモン','border-color:#00fbff;box-shadow:0 0 20px #00fbff44')}<div class="card-slot-label" style="color:#00fbff">ATK DP:12000</div></div>
<div style="font-size:2rem;font-weight:bold;color:#ff4444;text-shadow:0 0 15px #ff4444;animation:vsSlam .8s ease forwards;position:relative">VS</div>
<div class="card-slot">${card('メタルガルルモン','border-color:#ff4444;box-shadow:0 0 20px #ff444444')}<div class="card-slot-label" style="color:#ff4444">DEF DP:11000</div></div></div>`;
// Win表示
setTimeout(()=>ov('top:15%;left:50%;transform:translateX(-50%);font-size:1.5rem;font-weight:900;color:#00ff88;text-shadow:0 0 20px #00ff88;z-index:10','Win!!',3000),1500);
setTimeout(()=>ov('bottom:15%;left:50%;transform:translateX(-50%);font-size:.9rem;color:#aaa;z-index:10','「メタルガルルモン」撃破！',3000),2000)}

// 8. 対象選択UI
function d8(){cl();C.innerHTML=`<div style="display:flex;gap:10px">
<div class="card-slot">${card('グレイモン','border-color:#ff4444;--c:#ff4444;animation:selectPulse 1s ease infinite;cursor:pointer')}<div class="card-slot-label" style="color:#ff4444">選択可能</div></div>
<div class="card-slot">${card('アグモン','border-color:#ff4444;--c:#ff4444;animation:selectPulse 1s ease .3s infinite;cursor:pointer')}<div class="card-slot-label" style="color:#ff4444">選択可能</div></div>
<div class="card-slot">${card('ガブモン','border-color:#333;opacity:.4')}<div class="card-slot-label">対象外</div></div></div>`;
ov('bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ff4444;color:#ff4444;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:bold;z-index:5','🎯 消滅させる対象を選んでください',0)}

// 9. 効果確認ダイアログ
function d9(){cl();C.innerHTML=`<div style="background:#0a0a1a;border:2px solid #00fbff;border-radius:12px;padding:18px;max-width:240px;text-align:center;animation:confirmSlide .3s ease">
<div style="margin-bottom:10px">${card('メタルガルルモン','margin:0 auto;width:80px;height:112px;border-color:#00fbff')}</div>
<div style="font-size:12px;font-weight:bold;margin-bottom:4px">メタルガルルモン</div>
<div style="font-size:10px;color:#aaa;margin-bottom:10px;line-height:1.5">【アタック時】【ターンに1回】<br>このデジモンをアクティブにする。</div>
<div style="font-size:12px;color:#00fbff;font-weight:bold;margin-bottom:10px">効果を発動しますか？</div>
<div style="display:flex;gap:8px;justify-content:center">
<button style="background:#00fbff;color:#000;border:none;padding:7px 22px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:12px">はい</button>
<button style="background:#333;color:#fff;border:1px solid #666;padding:7px 22px;border-radius:6px;cursor:pointer;font-size:12px">いいえ</button></div></div>`}

// 10. 状態付与演出
function d10(){cl();C.innerHTML=`<div style="display:flex;gap:14px">
<div class="card-slot" style="position:relative">${card('アグモン','border-color:#9933ff;box-shadow:0 0 12px #9933ff44')}
<div style="position:absolute;top:-6px;right:-6px;background:#9933ff;color:#fff;font-size:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:buffApply .5s ease;box-shadow:0 0 8px #9933ff">⚔✖</div>
<div class="card-slot-label" style="color:#9933ff">アタック不可</div></div>
<div class="card-slot" style="position:relative">${card('ガブモン','border-color:#9933ff;box-shadow:0 0 12px #9933ff44')}
<div style="position:absolute;top:-6px;right:-6px;background:#9933ff;color:#fff;font-size:14px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:buffApply .5s ease .2s both;box-shadow:0 0 8px #9933ff">🛡✖</div>
<div class="card-slot-label" style="color:#9933ff">ブロック不可</div></div></div>`;
ov('top:20%;left:50%;transform:translateX(-50%);color:#9933ff;font-size:13px;font-weight:bold;text-shadow:0 0 10px #9933ff;animation:popupFloat 2.5s ease forwards','🔒 アタック・ブロック不可付与',2600)}

// 11. ドロー演出（現行準拠: カード飛来→画像しっかり表示→フェードアウト）
function d11(){cl();
// 背景暗転
const bg=ov('inset:0;background:rgba(0,0,0,.7);z-index:5;opacity:0;transition:opacity .3s','',4500);
setTimeout(()=>bg.style.opacity='1',50);
setTimeout(()=>bg.style.opacity='0',3500);
// カード飛来
C.innerHTML=`<div id="drawCard" style="opacity:0;transform:translate(-60px,-90px) scale(.3) rotate(-15deg);transition:all .7s cubic-bezier(.2,.8,.3,1)">
${card('ウォーグレイモン','border-color:#00ff88;box-shadow:0 0 30px #00ff88;width:120px;height:168px')}</div>`;
const dc=document.getElementById('drawCard');
// 飛んでくる
setTimeout(()=>{dc.style.opacity='1';dc.style.transform='translate(0,0) scale(1.05) rotate(0)'},200);
// 少し跳ねて安定
setTimeout(()=>{dc.style.transform='translate(0,0) scale(1) rotate(0)'},900);
// ドロー！テキスト
ov('top:18%;left:50%;transform:translateX(-50%);font-size:1.2rem;font-weight:bold;color:#00ff88;text-shadow:0 0 15px #00ff88;z-index:10;opacity:0;transition:opacity .3s','🃏 ドロー！',4000).style.cssText+='transition-delay:.8s;opacity:1';
// カード名
ov('bottom:18%;left:50%;transform:translateX(-50%);font-size:.9rem;color:#fff;z-index:10;opacity:0;transition:opacity .3s','ウォーグレイモン',4000).style.cssText+='transition-delay:1s;opacity:1';
// しっかり見せてからフェードアウト
setTimeout(()=>{dc.style.transition='all .8s ease';dc.style.opacity='0';dc.style.transform='translate(0,30px) scale(.9)'},3200)}

// 12. オープン演出
function d12(){cl();
const cards=['アグモン','グレイモン','ガルダモン'];
let html='<div style="display:flex;gap:8px;perspective:600px">';
cards.forEach((n,i)=>{html+=`<div class="card-slot"><div id="oc${i}" style="transform:rotateY(180deg);transition:transform .6s ease ${.5+i*.4}s;cursor:pointer">
<div style="width:80px;height:112px;border-radius:6px;border:2px solid #ffaa00;overflow:hidden;position:relative;background:#1a0a00">
${IMG?`<img src="${IMG}" style="width:100%;height:100%;object-fit:cover">`:''}
<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);padding:2px;font-size:7px;text-align:center">${n}</div></div></div>
<div class="card-slot-label" style="color:#ffaa00">${i+1}枚目</div></div>`});
html+='</div>';
C.innerHTML=html;
ov('top:10%;left:50%;transform:translateX(-50%);font-size:1rem;font-weight:bold;color:#ffaa00;letter-spacing:3px;text-shadow:0 0 15px #ffaa00;z-index:6','📖 DECK OPEN',4000);
cards.forEach((_,i)=>setTimeout(()=>{const el=document.getElementById('oc'+i);if(el)el.style.transform='rotateY(0)'},500+i*400))}

// 13. アプ合体（1枚ずつ登場→合体→1枚に）
function d13(){cl();
C.innerHTML=`<div style="display:flex;gap:20px;align-items:center;justify-content:center" id="ap">

</div>`;
ov('top:4%;left:50%;transform:translateX(-50%);font-size:1.2rem;font-weight:900;color:#ffdd00;letter-spacing:4px;text-shadow:0 0 20px #ffdd00,0 0 40px #ffaa00;z-index:6','⭐ JOGRESS EVOLUTION',7500);
const j1=document.getElementById('j1'),j2=document.getElementById('j2'),jp=document.getElementById('jplus');
// 1枚目スライドイン
setTimeout(()=>{j1.style.opacity='1';j1.style.transform='translateX(0)'},400);
// ＋表示
setTimeout(()=>{jp.style.opacity='1'},1100);
// 2枚目スライドイン
setTimeout(()=>{j2.style.opacity='1';j2.style.transform='translateX(0)'},1400);

setTimeout(()=>{jp.style.opacity='0'},2400);
// 中央に寄せながらクルクル交わる（楕円軌道）
let frame=0;const totalFrames=60;const dur=1500;
setTimeout(()=>{
const startTime=performance.now();
function animate(now){
const t=Math.min((now-startTime)/dur,1);
// 楕円回転（互いに逆回り）
const angle=t*Math.PI*2;
const rx=50*(1-t);const ry=25*(1-t);
const sc=1-t*.8;const op=1-t;
j1.style.transform=`translate(${70+Math.cos(angle)*rx-50}px,${Math.sin(angle)*ry}px) rotate(${t*720}deg) scale(${sc})`;
j1.style.opacity=op;
j2.style.transform=`translate(${-70+Math.cos(angle+Math.PI)*rx+50}px,${Math.sin(angle+Math.PI)*ry}px) rotate(${-t*720}deg) scale(${sc})`;
j2.style.opacity=op;
if(t<1)requestAnimationFrame(animate);
}
j1.style.transition='none';j2.style.transition='none';
requestAnimationFrame(animate);
},2500);
// キラキラ（カード消失後に中央から放射）
setTimeout(()=>{for(let i=0;i<30;i++){
const angle=Math.random()*Math.PI*2;
const dist=20+Math.random()*100;

const colors=['#ffdd00','#fff','#00fbff','#ff9900','#ff00fb'];
const p=ov(`left:50%;top:50%;width:${sz}px;height:${sz}px;margin-left:-${sz/2}px;margin-top:-${sz/2}px;background:${colors[i%5]};border-radius:50%;box-shadow:0 0 ${sz*3}px currentColor;z-index:8;opacity:0;transition:all 1s ease ${del}s`,'',2500);
setTimeout(()=>{p.style.opacity='1';p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
setTimeout(()=>{p.style.opacity='0'},600+del*1000)},50)}},4200);

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
  <title>バトルテスト画面</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/builder.css">
  <link rel="stylesheet" href="css/battle.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .test-panel {
      max-width: 500px; margin: auto; padding: 30px 20px; text-align: center;
    }
    .test-btn {
      display: block; width: 100%; padding: 16px; margin-bottom: 12px;
      background: var(--btn-grad); border: 1px solid var(--main-cyan); color: var(--main-cyan);
      border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer;
      transition: all 0.3s; text-align: left;
    }
    .test-btn:hover { background: var(--btn-hover); transform: translateY(-2px); box-shadow: 0 0 15px rgba(0,251,255,0.3); }
    .test-btn .test-sub { display: block; font-size: 11px; color: #aaa; font-weight: normal; margin-top: 4px; }
    .test-section { margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
    .test-label { color: #aaa; font-size: 12px; margin-bottom: 10px; text-align: left; }
    .test-select {
      width: 100%; padding: 12px; background: #111; border: 1px solid var(--border-col);
      color: #fff; border-radius: 6px; margin-bottom: 12px; font-size: 14px;
    }
  </style>
</head>
<body>

<!-- テスト選択画面 -->
<div id="test-menu-screen" class="screen active">
  <div class="test-panel">
    <h1 class="game-title" style="font-size:1.5rem;">🧪 バトルテスト</h1>
    <p style="color:#aaa; font-size:12px; margin-bottom:24px;">
      バトル画面の動作確認用。ログインなしでテストできます。
    </p>

    <!-- クイックテスト -->
    <button class="test-btn" onclick="startQuickTest()">
      ⚡ クイックテスト（ダミーデッキ）
      <span class="test-sub">ダミーカードでバトル画面をすぐテスト</span>
    </button>

    <!-- スプレッドシートのデッキでテスト -->
    <div class="test-section">
      <div class="test-label">📋 スプレッドシートのデッキでテスト</div>
      <select id="test-deck-select" class="test-select">
        <option value="">読み込み中...</option>
      </select>
      <select id="test-ai-deck-select" class="test-select">
        <option value="">AI用デッキ（読み込み中...）</option>
      </select>
      <div style="display:flex; gap:10px;">
        <button class="test-btn" style="flex:1;" onclick="startDeckTest(true)">
          先攻でテスト
        </button>
        <button class="test-btn" style="flex:1; border-color:#ff00fb; color:#ff00fb;" onclick="startDeckTest(false)">
          後攻でテスト
        </button>
      </div>
    </div>

    <!-- 演出テスト -->
    <div class="test-section">
      <div class="test-label">🎬 演出テスト</div>
      <button class="test-btn" onclick="testPhaseAnnounce()">
        フェーズ演出テスト
        <span class="test-sub">YOUR TURN / フェーズ名の表示をテスト</span>
      </button>
      <button class="test-btn" onclick="testGuide()">
        ガイド矢印テスト
        <span class="test-sub">チュートリアルガイドの表示をテスト</span>
      </button>
    </div>
  </div>
</div>

<!-- 各画面のコンテナ -->
<div id="page-battle"></div>

<!-- JS モジュール -->
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/cards.js"></script>
<script type="module" src="js/app.js"></script>
<script type="module" src="js/effect-engine.js"></script>
<script type="module" src="js/battle.js"></script>

<!-- 画面読み込み -->
<script type="module">
import { gasGet } from './js/firebase-config.js';
import { loadCardAndKeywordData, getCardImageUrl } from './js/cards.js';

// バトルHTMLを読み込み
const res = await fetch('pages/battle.html');
document.getElementById('page-battle').innerHTML = await res.text();

// showScreen をオーバーライド（テスト画面用）
const origShowScreen = window.showScreen;
window.showScreen = function(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  window.scrollTo(0, 0);
};

// カードデータ読み込み
await loadCardAndKeywordData();
console.log('Cards loaded:', allCards.length);

// デッキ一覧を読み込み
try {
  const tutorialDecks = await gasGet('getTutorialDecks');
  const select = document.getElementById('test-deck-select');
  const aiSelect = document.getElementById('test-ai-deck-select');
  select.innerHTML = '<option value="">プレイヤー用デッキを選択</option>';
  aiSelect.innerHTML = '<option value="">AI用デッキを選択</option>';

  if (tutorialDecks && tutorialDecks.length > 0) {
    tutorialDecks.forEach((d, i) => {
      const name = d.deckName || d.デッキ名 || '無題';
      const target = d.target || '';
      const opt1 = new Option(`${name} ${target}`, i);
      const opt2 = new Option(`${name} ${target}`, i);
      select.appendChild(opt1);
      aiSelect.appendChild(opt2);
    });
  }
  window._testTutorialDecks = tutorialDecks;
} catch(e) {
  console.error('デッキ読み込みエラー:', e);
}

// ===== テスト関数 =====

// ダミーデッキでクイックテスト
window.startQuickTest = function() {
  // allCardsからダミーデッキを生成
  const tama = allCards.filter(c => String(c["レベル"]) === '2').slice(0, 4);
  const lv3 = allCards.filter(c => String(c["レベル"]) === '3').slice(0, 10);
  const lv4 = allCards.filter(c => String(c["レベル"]) === '4').slice(0, 8);
  const lv5 = allCards.filter(c => String(c["レベル"]) === '5').slice(0, 4);
  const lv6 = allCards.filter(c => String(c["レベル"]) === '6').slice(0, 2);

  const makeDeckList = (cards) => {
    return cards.map(c => `${c["名前"]}(${c["カードNo"]})x1`).join(',');
  };

  // メイン50枚に足りない分はLv3で埋める
  let mainCards = [...lv3, ...lv4, ...lv5, ...lv6];
  while (mainCards.length < 50) {
    const extra = allCards.find(c => String(c["レベル"]) === '3' && !mainCards.includes(c));
    if (extra) mainCards.push(extra); else break;
  }

  const deckList = makeDeckList([...tama, ...mainCards.slice(0, 50)]);
  const deckData = { list: deckList };

  window.currentPlayerName = 'テスター';
  startBattleGame(deckData, deckData, true);
};

// スプレッドシートのデッキでテスト
window.startDeckTest = function(isFirst) {
  const pIdx = document.getElementById('test-deck-select').value;
  const aiIdx = document.getElementById('test-ai-deck-select').value;
  if (!pIdx && pIdx !== 0) return alert('プレイヤー用デッキを選択してください');

  const pDeck = window._testTutorialDecks[pIdx];
  const aiDeck = aiIdx ? window._testTutorialDecks[aiIdx] : pDeck;

  const pList = pDeck.list || pDeck.カードリスト;
  const aiList = aiDeck.list || aiDeck.カードリスト;

  if (!pList) return alert('デッキにカードリストがありません');

  window.currentPlayerName = 'テスター';
  startBattleGame({ list: pList }, { list: aiList }, isFirst);
};

// 演出テスト：全種類の演出を順番に表示
window.testPhaseAnnounce = function() {
  showScreen('battle-screen');

  // battle.js の演出関数を直接使う
  const steps = [
    cb => showYourTurn('自分のターン開始', '【先攻プレイヤー】', '#00fbff', cb),
    cb => showPhaseAnnounce('🔄 アクティブフェイズ', '#00fbff', cb),
    cb => showSkipAnnounce('🔄 アクティブフェイズ スキップ！', cb),
    cb => showPhaseAnnounce('🃏 ドローフェイズ', '#00ff88', cb),
    cb => showSkipAnnounce('🃏 ドローフェイズ スキップ！（先攻1ターン目）', cb),
    cb => showPhaseAnnounce('🥚 育成フェイズ', '#ff9900', cb),
    cb => showSkipAnnounce('🥚 育成フェイズ スキップ！', cb),
    cb => showPhaseAnnounce('⚡ メインフェイズ', '#ff00fb', cb),
    cb => showSkipAnnounce('⏩ メインフェイズ パス！', cb),
    cb => showYourTurn('自分のターン終了', '', '#555555', cb),
    cb => showYourTurn('相手のターン開始', '🤖 デジモンマスター', '#ff00fb', cb),
    cb => showYourTurn('相手のターン終了', '', '#555555', cb),
    cb => showYourTurn('自分のターン開始', '', '#00fbff', cb),
    cb => { showScreen('test-menu-screen'); }
  ];

  // showYourTurn等はbattle.jsのモジュール内関数なのでwindowに公開されていない場合がある
  // → battle.jsで公開するか、直接DOM操作
  let idx = 0;
  setTimeout(() => {
    function next() { if (idx < steps.length) steps[idx++](next); }
    next();
  }, 300);
};

// ガイドテスト
window.testGuide = function() {
  alert('ガイドテストはクイックテストからバトル画面に入ると、育成フェーズ・メインフェーズで自動表示されます。');
};

// バトル画面から戻るボタン（tutorial-screenがないので上書き）
const origBattleVictory = window.battleVictory;
const origBattleDefeat = window.battleDefeat;
window.battleVictory = function() { alert('🎉 勝利！'); showScreen('test-menu-screen'); };
window.battleDefeat = function() { alert('😢 敗北...'); showScreen('test-menu-screen'); };
</script>

</body>
</html>
